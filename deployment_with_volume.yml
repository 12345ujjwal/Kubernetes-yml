apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment
  namespace: test
  
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        
    spec:
      containers:
      - name: nginx-container
        image: nginx:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        
        volumeMounts:
        - name: my-volume
          mountPath: /usr/share/nginx/html
          
      volumes:
        - name: my-volume
          persistentVolumeClaim:
            claimName: local-pvc 
